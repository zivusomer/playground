$kind: http-request
name: 'Echo message'
method: POST
url: '{{baseURL}}/echo'
order: 2000
description: |-
  Sends a JSON body with a string `message` and receives the same value back.

  Expected response: `{ "message": "<your string>" }`.
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "message": "Hello from Postman"
    }
