$kind: http-request
name: 'Update user'
method: PUT
url: '{{baseURL}}/users/:id'
order: 4000
description: |-
  Updates an existing user by id.

  Uses a path variable example (`id`) and a JSON body example.
pathVariables:
  - key: id
    value: '1'
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Jane Doe Updated"
    }
